services:
  - type: web
    name: adobe-launch-mcp
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: node src/config-server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DEBUG
        value: false
      - key: ALLOWED_ORIGINS
        value: "*"
    healthCheckPath: /health
